<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>ChinaReady - Version Intégrale</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        body { margin: 0; background: #0f0f14; color: white; font-family: 'Segoe UI', sans-serif; -webkit-tap-highlight-color: transparent; }
        .card-inner { transition: transform 0.6s; transform-style: preserve-3d; cursor: pointer; position: relative; min-height: 260px; width: 100%; }
        .flipped { transform: rotateY(180deg); }
        .module-card { background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08); border-radius: 16px; padding: 16px; margin-bottom: 12px; display: flex; align-items: center; gap: 14px; cursor: pointer; }
        .btn-mode { background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.1); border-radius: 16px; padding: 18px; margin-bottom: 14px; width: 100%; display: flex; align-items: center; gap: 16px; color: white; text-align: left; cursor: pointer; }
        .progress-bg { height: 4px; background: rgba(255,255,255,0.08); border-radius: 2px; flex: 1; margin-top: 8px; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useMemo } = React;

        const TONE_COLORS = { 1:"#e8392a", 2:"#f59e0b", 3:"#22c55e", 4:"#3b82f6", 0:"#9ca3af" };

        const MODULES = [
            { id:"basics", emoji:"🗣️", title:"Survie de base", color:"#e8392a", phrases:[
                { chinese:"你好", pinyin:"nǐ hǎo", french:"Bonjour / Salut", phonetic:"ni-r' ha-o", tone:3 },
                { chinese:"谢谢", pinyin:"xiè xie", french:"Merci", phonetic:"syè-syè", tone:4 },
                { chinese:"不客气", pinyin:"bú kè qi", french:"De rien", phonetic:"bou-kheu-tchi", tone:2 },
                { chinese:"对不起", pinyin:"duì bu qǐ", french:"Pardon / Excusez-moi", phonetic:"douèï-bou-tchi-r'", tone:4 },
                { chinese:"没关系", pinyin:"méi guān xi", french:"Ce n'est pas grave", phonetic:"méï-gouan-ssi", tone:2 },
                { chinese:"Tagada", pinyin:"shì", french:"Oui / C'est ça", phonetic:"ch-r'", tone:4 },
                { chinese:"不是", pinyin:"bú shì", french:"Non / Ce n'est pas ça", phonetic:"bou-ch-r'", tone:2 },
                { chinese:"我不懂", pinyin:"wǒ bù dǒng", french:"Je ne comprends pas", phonetic:"wo-bou-dong", tone:3 },
                { chinese:"请说慢一点", pinyin:"qǐng shuō màn yī diǎn", french:"Parlez plus lentement", phonetic:"tching-chouo-mann-yi-tyenn", tone:3 },
                { chinese:"你会说英语吗？", pinyin:"nǐ huì shuō yīng yǔ ma?", french:"Parlez-vous anglais ?", phonetic:"ni-houèï-chouo-ying-yü-ma", tone:3 }
            ]},
            { id:"food", emoji:"🍜", title:"Restaurants", color:"#f59e0b", phrases:[
                { chinese:"菜单", pinyin:"cài dān", french:"Le menu / La carte", phonetic:"tsaï-dann", tone:4 },
                { chinese:"我要这个", pinyin:"wǒ yào zhè ge", french:"Je veux celui-ci", phonetic:"wo-yao-jeu-geu", tone:3 },
                { chinese:"好吃！", pinyin:"hǎo chī!", french:"C'est délicieux !", phonetic:"hao-tch-r'", tone:3 },
                { chinese:"我对…过敏", pinyin:"wǒ duì … guò mǐn", french:"Je suis allergique à…", phonetic:"wo-douèï-[...]gouo-minn", tone:3 },
                { chinese:"不要辣", pinyin:"bú yào là", french:"Pas épicé", phonetic:"bou-yao-la", tone:4 },
                { chinese:"素食", pinyin:"sù shí", french:"Végétarien", phonetic:"sou-ch-r'", tone:4 },
                { chinese:"买单", pinyin:"mǎi dān", french:"L'addition s'il vous plaît", phonetic:"maï-dann", tone:3 },
                { chinese:"可以刷卡吗？", pinyin:"kě yǐ shuā kǎ ma?", french:"Acceptez-vous les cartes ?", phonetic:"kheu-yi-choua-ka-ma", tone:3 },
                { chinese:"水", pinyin:"shuǐ", french:"De l'eau", phonetic:"chouèï", tone:3 },
                { chinese:"啤酒", pinyin:"pí jiǔ", french:"De la bière", phonetic:"pi-jyou", tone:2 }
            ]},
            { id:"transport", emoji:"🚇", title:"Transports", color:"#6366f1", phrases:[
                { chinese:"出租车", pinyin:"chū zū chē", french:"Taxi", phonetic:"tchou-tsou-tcheu", tone:1 },
                { chinese:"地铁", pinyin:"dì tiě", french:"Métro", phonetic:"ti-tyè", tone:4 },
                { chinese:"请带我去…", pinyin:"qǐng dài wǒ qù …", french:"Emmenez-moi à…", phonetic:"tching-daï-wo-tchü-[...]", tone:3 },
                { chinese:"机场", pinyin:"jī chǎng", french:"Aéroport", phonetic:"ji-tchang", tone:1 },
                { chinese:"火车站", pinyin:"huǒ chē zhàn", french:"Gare ferroviaire", phonetic:"houo-tcheu-jann", tone:3 },
                { chinese:"停在这里", pinyin:"tíng zài zhè lǐ", french:"Arrêtez-vous ici", phonetic:"ting-zaï-jeu-li", tone:2 },
                { chinese:"多少钱？", pinyin:"duō shao qián?", french:"Combien ça coûte ?", phonetic:"douo-chao-tchienn", tone:1 },
                { chinese:"左", pinyin:"zuǒ", french:"À gauche", phonetic:"tsou-or'", tone:3 },
                { chinese:"右", pinyin:"yòu", french:"À droite", phonetic:"yiou", tone:4 },
                { chinese:"直走", pinyin:"zhí zǒu", french:"Tout droit", phonetic:"j-r'-tsou", tone:2 }
            ]},
            { id:"hotel", emoji:"🏨", title:"Hôtel", color:"#8b5cf6", phrases:[
                { chinese:"我有预订", pinyin:"wǒ yǒu yù dìng", french:"J'ai une réservation", phonetic:"wo-yiou-yü-ting", tone:3 },
                { chinese:"入住", pinyin:"rù zhù", french:"Check-in", phonetic:"rou-jou", tone:4 },
                { chinese:"退房", pinyin:"tuì fáng", french:"Check-out", phonetic:"touèï-fang", tone:4 },
                { chinese:"我的房间", pinyin:"wǒ de fáng jiān", french:"Ma chambre", phonetic:"wo-deu-fang-tyenn", tone:3 },
                { chinese:"空调坏了", pinyin:"kōng tiáo huài le", french:"La climatisation est cassée", phonetic:"khong-tyao-houaï-leu", tone:1 },
                { chinese:"毛巾", pinyin:"máo jīn", french:"Serviette de bain", phonetic:"mao-jinn", tone:2 },
                { chinese:"WIFI密码是什么？", pinyin:"WIFI mì mǎ shì shén me?", french:"WiFi ?", phonetic:"WiFi-mi-ma-ch-r'-chenn-meu", tone:4 },
                { chinese:"行李寄存", pinyin:"xíng lǐ jì cún", french:"Consigne à bagages", phonetic:"sing-li-ji-tsonn", tone:2 }
            ]},
            { id:"shopping", emoji:"🛍️", title:"Shopping", color:"#ec4899", phrases:[
                { chinese:"多少钱？", pinyin:"duō shao qián?", french:"Combien ça coûte ?", phonetic:"douo-chao-tchienn", tone:1 },
                { chinese:"太贵了", pinyin:"tài guì le", french:"C'est trop cher", phonetic:"taï-gouèï-leu", tone:4 },
                { chinese:"便宜一点", pinyin:"pián yi yī diǎn", french:"Un peu moins cher", phonetic:"pyenn-yi-yi-tyenn", tone:2 },
                { chinese:"我买了", pinyin:"wǒ mǎi le", french:"Je le prends", phonetic:"wo-maï-leu", tone:3 },
                { chinese:"不要了", pinyin:"bú yào le", french:"Je n'en veux pas", phonetic:"bou-yao-leu", tone:4 },
                { chinese:"有没有…？", pinyin:"yǒu méi yǒu…?", french:"Avez-vous… ?", phonetic:"yiou-méï-yiou-[...]", tone:3 },
                { chinese:"可以试穿吗？", pinyin:"kě yǐ shì chuān ma?", french:"Puis-je l'essayer ?", phonetic:"kheu-yi-ch-r'-tchouan-ma", tone:3 },
                { chinese:"收据", pinyin:"shōu jù", french:"Reçu / Ticket", phonetic:"chou-jü", tone:1 }
            ]},
            { id:"emergency", emoji:"🚨", title:"Urgences", color:"#ef4444", phrases:[
                { chinese:"救命！", pinyin:"jiù mìng!", french:"Au secours !", phonetic:"jyou-ming", tone:4 },
                { chinese:"我需要医生", pinyin:"wǒ xū yào yī shēng", french:"Besoin d'un médecin", phonetic:"wo-ssü-yao-yi-cheng", tone:3 },
                { chinese:"医院在哪里？", pinyin:"yī yuàn zài nǎ lǐ?", french:"Où est l'hôpital ?", phonetic:"yi-yüann-zaï-na-li", tone:1 },
                { chinese:"警察", pinyin:"jǐng chá", french:"Police", phonetic:"jing-tcha", tone:3 },
                { chinese:"我迷路了", pinyin:"wǒ mí lù le", french:"Je suis perdu(e)", phonetic:"wo-mi-lou-leu", tone:3 },
                { chinese:"请帮帮我", pinyin:"qǐng bāng bāng wǒ", french:"Aidez-moi", phonetic:"tching-bang-bang-wo", tone:3 },
                { chinese:"我的护照丢了", pinyin:"wǒ de hù zhào diū le", french:"Passeport perdu", phonetic:"wo-deu-hou-jao-dyou-leu", tone:3 },
                { chinese:"大使馆", pinyin:"dà shǐ guǎn", french:"Ambassade", phonetic:"ta-ch-r'-gouan", tone:4 }
            ]},
            { id:"numbers", emoji:"💬", title:"Chiffres & Argent", color:"#14b8a6", phrases:[
                { chinese:"一 二 三", pinyin:"yī èr sān", french:"1, 2, 3", phonetic:"yi-eu-r'-sann", tone:1 },
                { chinese:"四 五 六", pinyin:"sì wǔ liù", french:"4, 5, 6", phonetic:"ss-r'-wou-lyou", tone:4 },
                { chinese:"七 八 九 十", pinyin:"qī bā jiǔ shí", french:"7, 8, 9, 10", phonetic:"tchi-ba-jyou-ch-r'", tone:1 },
                { chinese:"百", pinyin:"bǎi", french:"Cent (100)", phonetic:"baï", tone:3 },
                { chinese:"元 / 块", pinyin:"yuán / kuài", french:"Yuan", phonetic:"yüann / kouaï", tone:2 },
                { chinese:"我想换钱", pinyin:"wǒ xiǎng huàn qián", french:"Changer de l'argent", phonetic:"wo-ssyang-houan-tchienn", tone:3 },
                { chinese:"可以用支付宝吗？", pinyin:"kě yǐ yòng Zhī fù bǎo ma?", french:"Payer avec Alipay ?", phonetic:"kheu-yi-yong-j-r'-fou-bao-ma", tone:3 },
                { chinese:"找钱", pinyin:"zhǎo qián", french:"La monnaie", phonetic:"jao-tchienn", tone:3 }
            ]}
        ];

        function speak(t) {
            window.speechSynthesis.cancel();
            const u = new SpeechSynthesisUtterance(t);
            u.lang = "zh-CN"; u.rate = 0.82;
            window.speechSynthesis.speak(u);
        }

        function App() {
            const [activeModId, setActiveModId] = useState(null);
            const [mode, setMode] = useState(null); // 'flash', 'quiz', 'list'
            const [progress, setProgress] = useState({});

            const activeMod = useMemo(() => MODULES.find(m => m.id === activeModId), [activeModId]);

            // --- VUES ---
            if (mode === 'flash') return (
                <div style={{ padding: 20 }}>
                    <div onClick={() => setMode(null)} style={{ color: "#e8392a", marginBottom: 20 }}>✕ Fermer</div>
                    <Flashcard phrases={activeMod.phrases} />
                </div>
            );

            if (mode === 'list') return (
                <div style={{ padding: 20 }}>
                    <div onClick={() => setMode(null)} style={{ color: "#e8392a", marginBottom: 20 }}>← Retour</div>
                    {activeMod.phrases.map((p, i) => (
                        <div key={i} className="module-card">
                            <button onClick={() => speak(p.chinese)} style={{ background:"none", border:"none", fontSize:20 }}>▶</button>
                            <div>
                                <div style={{ fontSize: 20, fontWeight: "bold" }}>{p.chinese}</div>
                                <div style={{ color: TONE_COLORS[p.tone], fontSize: 13 }}>{p.pinyin}</div>
                                <div style={{ color: "#aaa", fontSize: 14 }}>{p.french}</div>
                            </div>
                        </div>
                    ))}
                </div>
            );

            if (activeModId) return (
                <div style={{ padding: 20 }}>
                    <div onClick={() => setActiveModId(null)} style={{ color: "#e8392a", marginBottom: 20 }}>← Menu</div>
                    <div style={{ display:"flex", alignItems:"center", gap:15, marginBottom:25 }}>
                        <span style={{ fontSize:40 }}>{activeMod.emoji}</span>
                        <h2 style={{ margin:0 }}>{activeMod.title}</h2>
                    </div>
                    <div className="btn-mode" onClick={() => setMode('flash')}>
                        <span style={{ fontSize:24 }}>🃏</span>
                        <div><strong>Flashcards</strong><br/><small>Mémoriser les cartes</small></div>
                    </div>
                    <div className="btn-mode" onClick={() => setMode('list')}>
                        <span style={{ fontSize:24 }}>📖</span>
                        <div><strong>Phrasebook</strong><br/><small>Écouter toutes les voix</small></div>
                    </div>
                </div>
            );

            return (
                <div style={{ padding: 20, maxWidth: 480, margin: "0 auto" }}>
                    <h1 style={{ letterSpacing:"-1px" }}>学中文 <small style={{ fontSize:14, color:"#666" }}>• ChinaReady</small></h1>
                    <div style={{ background:"linear-gradient(135deg,rgba(232,57,42,0.1),rgba(232,57,42,0.05))", borderRadius:16, padding:20, marginBottom:30, border:"1px solid rgba(232,57,42,0.2)" }}>
                        <div style={{ fontSize:32, fontWeight:900, color:"#e8392a" }}>0%</div>
                        <div style={{ fontSize:11, color:"#666" }}>PROGRESSION GLOBALE</div>
                    </div>
                    {MODULES.map(m => (
                        <div key={m.id} className="module-card" onClick={() => setActiveModId(m.id)}>
                            <span style={{ fontSize:30 }}>{m.emoji}</span>
                            <div style={{ flex:1 }}>
                                <div style={{ fontWeight:"bold" }}>{m.title}</div>
                                <div className="progress-bg"><div style={{ width:'0%', height:'100%', background:m.color, borderRadius:2 }}></div></div>
                            </div>
                            <div style={{ textAlign:"right", minWidth:45 }}>
                                <div style={{ color:m.color, fontWeight:"bold" }}>0%</div>
                                <div style={{ fontSize:10, color:"#444" }}>{m.phrases.length} exp.</div>
                            </div>
                        </div>
                    ))}
                </div>
            );
        }

        function Flashcard({ phrases }) {
            const [idx, setIdx] = useState(0);
            const [flipped, setFlipped] = useState(false);
            const p = phrases[idx];
            return (
                <div>
                    <div className={`card-inner ${flipped ? 'flipped' : ''}`} onClick={() => setFlipped(!flipped)} style={{ perspective:1000 }}>
                        <div style={{ background:"#1a1a24", height:260, borderRadius:20, display:"flex", alignItems:"center", justifyContent:"center", fontSize:60, backfaceVisibility:"hidden", position:"absolute", width:"100%", border:"1px solid #333" }}>{p.chinese}</div>
                        <div style={{ background:"#2a1f2e", height:260, borderRadius:20, display:"flex", flexDirection:"column", alignItems:"center", justifyContent:"center", backfaceVisibility:"hidden", transform:"rotateY(180deg)", position:"absolute", width:"100%", border:"1px solid #e8392a" }}>
                            <div style={{ fontSize:30 }}>{p.pinyin}</div>
                            <div style={{ color:"#ccc" }}>{p.french}</div>
                        </div>
                    </div>
                    <div style={{ marginTop:280, display:"flex", gap:10 }}>
                        <button onClick={() => { setFlipped(false); setIdx((idx + 1) % phrases.length); }} style={{ flex:1, padding:15, background:"#e8392a", border:"none", color:"white", borderRadius:12 }}>Suivant →</button>
                    </div>
                </div>
            );
        }

        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
