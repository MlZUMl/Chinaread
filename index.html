<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>ChinaReady - Flashcards Fix</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        body { margin: 0; background: #0f0f14; color: white; font-family: -apple-system, sans-serif; overflow-x: hidden; }
        .sticky-header { position: sticky; top: 0; z-index: 50; background: rgba(15,15,20,0.9); backdrop-filter: blur(10px); border-bottom: 1px solid rgba(255,255,255,0.1); padding: 12px 16px; display: flex; align-items: center; justify-content: space-between; }
        
        /* Design des Flashcards */
        .card-container { perspective: 1000px; width: 100%; max-width: 340px; height: 420px; margin: 20px auto; position: relative; }
        .card-inner { width: 100%; height: 100%; position: relative; transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1); transform-style: preserve-3d; cursor: pointer; }
        .card-inner.flipped { transform: rotateY(180deg); }
        .card-face { position: absolute; inset: 0; backface-visibility: hidden; border-radius: 30px; display: flex; flexDirection: column; align-items: center; justify-content: center; padding: 30px; border: 1px solid rgba(255,255,255,0.1); box-shadow: 0 15px 35px rgba(0,0,0,0.5); }
        .card-front { background: #1a1a24; }
        .card-back { background: #2a1f2e; transform: rotateY(180deg); border-color: #e8392a; }
        
        /* Bouton Audio Style Original */
        .audio-circle { width: 44px; height: 44px; border-radius: 50%; border: 1.5px solid rgba(255,255,255,0.2); display: flex; align-items: center; justify-content: center; background: rgba(255,255,255,0.05); color: white; cursor: pointer; position: absolute; top: 20px; right: 20px; }
        
        .btn-next { background: #e8392a; color: white; border: none; padding: 18px; border-radius: 18px; width: 100%; font-weight: bold; font-size: 16px; margin-top: 20px; cursor: pointer; }
        .module-card { background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08); border-radius: 20px; padding: 18px; margin: 0 16px 12px; display: flex; align-items: center; gap: 15px; cursor: pointer; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;

        const TONES = { 1: "#e8392a", 2: "#f59e0b", 3: "#22c55e", 4: "#3b82f6", 0: "#9ca3af" };

        const DATA = [
            { id: "basics", title: "Survie de base", emoji: "🗣️", phrases: [
                { c: "你好", p: "nǐ hǎo", f: "Bonjour / Salut", ph: "ni-r' ha-o", t: 3 },
                { c: "谢谢", p: "xiè xie", f: "Merci", ph: "syè-syè", t: 4 },
                { c: "不客气", p: "bú kè qi", f: "De rien", ph: "bou-kheu-tchi", t: 2 }
            ]}
        ];

        function speak(text) {
            window.speechSynthesis.cancel();
            const u = new SpeechSynthesisUtterance(text);
            u.lang = "zh-CN"; u.rate = 0.8;
            window.speechSynthesis.speak(u);
        }

        function App() {
            const [activeMod, setActiveMod] = useState(null);
            const [view, setView] = useState('menu'); 
            const [cardIdx, setCardIdx] = useState(0);
            const [flipped, setFlipped] = useState(false);

            const mod = DATA.find(m => m.id === activeMod);

            // --- VUE FLASHCARDS (CORRIGÉE) ---
            if (activeMod && view === 'flash') {
                const p = mod.phrases[cardIdx];
                return (
                    <div style={{ padding: "0 20px" }}>
                        <div onClick={() => setView('menu')} style={{ padding: "20px 0", color: "#e8392a", fontWeight: "bold" }}>✕ Quitter</div>
                        
                        <div className="card-container">
                            <div className={`card-inner ${flipped ? 'flipped' : ''}`} onClick={() => setFlipped(!flipped)}>
                                {/* Recto : Chinois Seul */}
                                <div className="card-face card-front">
                                    <div style={{ fontSize: 80, fontWeight: "bold" }}>{p.c}</div>
                                    <div style={{ color: "#444", marginTop: 20 }}>Tapoter pour voir la réponse</div>
                                </div>
                                
                                {/* Verso : Détails + AUDIO */}
                                <div className="card-face card-back">
                                    <div className="audio-circle" onClick={(e) => { e.stopPropagation(); speak(p.c); }}>▶</div>
                                    <div style={{ fontSize: 40, fontWeight: "bold", color: "#e8392a" }}>{p.p}</div>
                                    <div style={{ fontSize: 24, margin: "15px 0", textAlign: "center" }}>{p.f}</div>
                                    <div style={{ color: "#888", fontStyle: "italic" }}>"{p.ph}"</div>
                                    <div style={{ marginTop: 20, color: TONES[p.t], fontWeight: "bold", border: `1px solid ${TONES[p.t]}`, padding: "4px 12px", borderRadius: 10 }}>Ton {p.t}</div>
                                </div>
                            </div>
                        </div>

                        <button className="btn-next" onClick={() => { setFlipped(false); setCardIdx((cardIdx + 1) % mod.phrases.length); }}>
                            Expression suivante →
                        </button>
                    </div>
                );
            }

            // --- DASHBOARD SIMPLE ---
            return (
                <div style={{ padding: "20px 0" }}>
                    <h1 style={{ padding: "0 20px" }}>Mes Modules</h1>
                    {DATA.map(m => (
                        <div key={m.id} className="module-card" onClick={() => { setActiveMod(m.id); setView('flash'); }}>
                            <span style={{ fontSize: 30 }}>{m.emoji}</span>
                            <div style={{ fontWeight: "bold" }}>{m.title}</div>
                        </div>
                    ))}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
