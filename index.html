<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>ChinaReady - Intégral</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        body { margin: 0; background: #0f0f14; color: white; font-family: 'Segoe UI', system-ui, sans-serif; -webkit-tap-highlight-color: transparent; overflow-x: hidden; }
        .module-card { background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08); border-radius: 20px; padding: 18px; margin-bottom: 14px; display: flex; align-items: center; gap: 16px; cursor: pointer; transition: all 0.2s; }
        .module-card:active { transform: scale(0.97); background: rgba(255,255,255,0.08); }
        .progress-container { flex: 1; }
        .progress-bar-bg { height: 4px; background: rgba(255,255,255,0.08); border-radius: 2px; margin-top: 8px; width: 100%; position: relative; }
        .progress-bar-fill { height: 100%; border-radius: 2px; transition: width 0.6s cubic-bezier(0.4, 0, 0.2, 1); }
        .btn-mode { background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.1); border-radius: 18px; padding: 20px; margin-bottom: 16px; width: 100%; display: flex; align-items: center; gap: 20px; color: white; text-align: left; cursor: pointer; transition: 0.2s; }
        .btn-mode:active { background: rgba(255,255,255,0.1); }
        .badge-ton { font-size: 11px; padding: 2px 8px; border-radius: 10px; font-weight: 600; font-family: monospace; }
        .phrase-item { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.06); border-radius: 16px; padding: 16px; margin-bottom: 12px; display: flex; align-items: center; gap: 16px; }
        .audio-circle { width: 36px; height: 36px; border-radius: 50%; border: 1px solid rgba(255,255,255,0.2); display: flex; align-items: center; justify-content: center; background: rgba(255,255,255,0.05); color: #aaa; cursor: pointer; flex-shrink: 0; }
        .card-inner { transition: transform 0.6s; transform-style: preserve-3d; cursor: pointer; position: relative; min-height: 280px; width: 100%; }
        .flipped { transform: rotateY(180deg); }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useCallback, useMemo } = React;

        const TONE_COLORS = { 1:"#e8392a", 2:"#f59e0b", 3:"#22c55e", 4:"#3b82f6", 0:"#9ca3af" };

        const MODULES = [
            { id:"basics", emoji:"🗣️", title:"Survie de base", color:"#e8392a", phrases:[
                { chinese:"你好", pinyin:"nǐ hǎo", french:"Bonjour / Salut", phonetic:"ni-r' ha-o", tone:3 },
                { chinese:"谢谢", pinyin:"xiè xie", french:"Merci", phonetic:"syè-syè", tone:4 },
                { chinese:"不客气", pinyin:"bú kè qi", french:"De rien", phonetic:"bou-kheu-tchi", tone:2 },
                { chinese:"对不起", pinyin:"duì bu qǐ", french:"Pardon / Excusez-moi", phonetic:"douèï-bou-tchi-r'", tone:4 },
                { chinese:"没关系", pinyin:"méi guān xi", french:"Ce n'est pas grave", phonetic:"méï-gouan-ssi", tone:2 },
                { chinese:"是", pinyin:"shì", french:"Oui / C'est ça", phonetic:"ch-r'", tone:4 },
                { chinese:"不是", pinyin:"bú shì", french:"Non / Ce n'est pas ça", phonetic:"bou-ch-r'", tone:2 },
                { chinese:"我不懂", pinyin:"wǒ bù dǒng", french:"Je ne comprends pas", phonetic:"wo-bou-dong", tone:3 },
                { chinese:"请说慢一点", pinyin:"qǐng shuō màn yī diǎn", french:"Parlez plus lentement", phonetic:"tching-chouo-mann-yi-tyenn", tone:3 },
                { chinese:"你会说英语吗？", pinyin:"nǐ huì shuō yīng yǔ ma?", french:"Parlez-vous anglais ?", phonetic:"ni-houèï-chouo-ying-yü-ma", tone:3 }
            ]},
            { id:"food", emoji:"🍜", title:"Restaurants", color:"#f59e0b", phrases:[
                { chinese:"菜单", pinyin:"cài dān", french:"Le menu / La carte", phonetic:"tsaï-dann", tone:4 },
                { chinese:"我要这个", pinyin:"wǒ yào zhè ge", french:"Je veux celui-ci", phonetic:"wo-yao-jeu-geu", tone:3 },
                { chinese:"好吃！", pinyin:"hǎo chī!", french:"C'est délicieux !", phonetic:"hao-tch-r'", tone:3 },
                { chinese:"我对…过敏", pinyin:"wǒ duì … guò mǐn", french:"Je suis allergique à…", phonetic:"wo-douèï-[...]gouo-minn", tone:3 },
                { chinese:"不要辣", pinyin:"bú yào là", french:"Pas épicé", phonetic:"bou-yao-la", tone:4 },
                { chinese:"素食", pinyin:"sù shí", french:"Végétarien", phonetic:"sou-ch-r'", tone:4 },
                { chinese:"买单", pinyin:"mǎi dān", french:"L'addition s'il vous plaît", phonetic:"maï-dann", tone:3 },
                { chinese:"可以刷卡吗？", pinyin:"kě yǐ shuā kǎ ma?", french:"Acceptez-vous les cartes ?", phonetic:"kheu-yi-choua-ka-ma", tone:3 },
                { chinese:"水", pinyin:"shuǐ", french:"De l'eau", phonetic:"chouèï", tone:3 },
                { chinese:"啤酒", pinyin:"pí jiǔ", french:"De la bière", phonetic:"pi-jyou", tone:2 }
            ]},
            { id:"transport", emoji:"🚇", title:"Transports", color:"#6366f1", phrases:[
                { chinese:"出租车", pinyin:"chū zū chē", french:"Taxi", phonetic:"tchou-tsou-tcheu", tone:1 },
                { chinese:"地铁", pinyin:"dì tiě", french:"Métro", phonetic:"ti-tyè", tone:4 },
                { chinese:"请带我去…", pinyin:"qǐng dài wǒ qù …", french:"Emmenez-moi à…", phonetic:"tching-daï-wo-tchü-[...]", tone:3 },
                { chinese:"机场", pinyin:"jī chǎng", french:"Aéroport", phonetic:"ji-tchang", tone:1 },
                { chinese:"火车站", pinyin:"huǒ chē zhàn", french:"Gare ferroviaire", phonetic:"houo-tcheu-jann", tone:3 },
                { chinese:"停在这里", pinyin:"tíng zài zhè lǐ", french:"Arrêtez-vous ici", phonetic:"ting-zaï-jeu-li", tone:2 },
                { chinese:"多少钱？", pinyin:"duō shao qián?", french:"Combien ça coûte ?", phonetic:"douo-chao-tchienn", tone:1 },
                { chinese:"左", pinyin:"zuǒ", french:"À gauche", phonetic:"tsou-or'", tone:3 },
                { chinese:"右", pinyin:"yòu", french:"À droite", phonetic:"yiou", tone:4 },
                { chinese:"直走", pinyin:"zhí zǒu", french:"Tout droit", phonetic:"j-r'-tsou", tone:2 }
            ]},
            { id:"hotel", emoji:"🏨", title:"Hôtel", color:"#8b5cf6", phrases:[
                { chinese:"我有预订", pinyin:"wǒ yǒu yù dìng", french:"J'ai une réservation", phonetic:"wo-yiou-yü-ting", tone:3 },
                { chinese:"入住", pinyin:"rù zhù", french:"Check-in", phonetic:"rou-jou", tone:4 },
                { chinese:"退房", pinyin:"tuì fáng", french:"Check-out", phonetic:"touèï-fang", tone:4 },
                { chinese:"我的房间", pinyin:"wǒ de fáng jiān", french:"Ma chambre", phonetic:"wo-deu-fang-tyenn", tone:3 },
                { chinese:"空调坏了", pinyin:"kōng tiáo huài le", french:"La climatisation est cassée", phonetic:"khong-tyao-houaï-leu", tone:1 },
                { chinese:"毛巾", pinyin:"máo jīn", french:"Serviette de bain", phonetic:"mao-jinn", tone:2 },
                { chinese:"WIFI密码是什么？", pinyin:"WIFI mì mǎ shì shén me?", french:"Quel est le mot de passe WiFi ?", phonetic:"WiFi-mi-ma-ch-r'-chenn-meu", tone:4 },
                { chinese:"行李寄存", pinyin:"xíng lǐ jì cún", french:"Consigne à bagages", phonetic:"sing-li-ji-tsonn", tone:2 }
            ]},
            { id:"shopping", emoji:"🛍️", title:"Shopping", color:"#ec4899", phrases:[
                { chinese:"多少钱？", pinyin:"duō shao qián?", french:"Combien ça coûte ?", phonetic:"douo-chao-tchienn", tone:1 },
                { chinese:"太贵了", pinyin:"tài guì le", french:"C'est trop cher", phonetic:"taï-gouèï-leu", tone:4 },
                { chinese:"便宜一点", pinyin:"pián yi yī diǎn", french:"Un peu moins cher", phonetic:"pyenn-yi-yi-tyenn", tone:2 },
                { chinese:"我买了", pinyin:"wǒ mǎi le", french:"Je le prends", phonetic:"wo-maï-leu", tone:3 },
                { chinese:"不要了", pinyin:"bú yào le", french:"Je n'en veux pas", phonetic:"bou-yao-leu", tone:4 },
                { chinese:"有没有…？", pinyin:"yǒu méi yǒu…?", french:"Avez-vous… ?", phonetic:"yiou-méï-yiou-[...]", tone:3 },
                { chinese:"可以试穿吗？", pinyin:"kě yǐ shì chuān ma?", french:"Puis-je l'essayer ?", phonetic:"kheu-yi-ch-r'-tchouan-ma", tone:3 },
                { chinese:"收据", pinyin:"shōu jù", french:"Reçu / Ticket de caisse", phonetic:"chou-jü", tone:1 }
            ]},
            { id:"emergency", emoji:"🚨", title:"Urgences", color:"#ef4444", phrases:[
                { chinese:"救命！", pinyin:"jiù mìng!", french:"Au secours !", phonetic:"jyou-ming", tone:4 },
                { chinese:"我需要医生", pinyin:"wǒ xū yào yī shēng", french:"J'ai besoin d'un médecin", phonetic:"wo-ssü-yao-yi-cheng", tone:3 },
                { chinese:"医院在哪里？", pinyin:"yī yuàn zài nǎ lǐ?", french:"Où est l'hôpital ?", phonetic:"yi-yüann-zaï-na-li", tone:1 },
                { chinese:"警察", pinyin:"jǐng chá", french:"Police", phonetic:"jing-tcha", tone:3 },
                { chinese:"我迷路了", pinyin:"wǒ mí lù le", french:"Je suis perdu(e)", phonetic:"wo-mi-lou-leu", tone:3 },
                { chinese:"请帮帮我", pinyin:"qǐng bāng bāng wǒ", french:"Aidez-moi s'il vous plaît", phonetic:"tching-bang-bang-wo", tone:3 },
                { chinese:"我的护照丢了", pinyin:"wǒ de hù zhào diū le", french:"J'ai perdu mon passeport", phonetic:"wo-deu-hou-jao-dyou-leu", tone:3 },
                { chinese:"大使馆", pinyin:"dà shǐ guǎn", french:"Ambassade", phonetic:"ta-ch-r'-gouan", tone:4 }
            ]},
            { id:"numbers", emoji:"💬", title:"Chiffres & Argent", color:"#14b8a6", phrases:[
                { chinese:"一 二 三", pinyin:"yī èr sān", french:"1, 2, 3", phonetic:"yi-eu-r'-sann", tone:1 },
                { chinese:"四 五 六", pinyin:"sì wǔ liù", french:"4, 5, 6", phonetic:"ss-r'-wou-lyou", tone:4 },
                { chinese:"七 八 九 十", pinyin:"qī bā jiǔ shí", french:"7, 8, 9, 10", phonetic:"tchi-ba-jyou-ch-r'", tone:1 },
                { chinese:"百", pinyin:"bǎi", french:"Cent (100)", phonetic:"baï", tone:3 },
                { chinese:"元 / 块", pinyin:"yuán / kuài", french:"Yuan (monnaie)", phonetic:"yüann / kouaï", tone:2 },
                { chinese:"我想换钱", pinyin:"wǒ xiǎng huàn qián", french:"Je voudrais changer de l'argent", phonetic:"wo-ssyang-houan-tchienn", tone:3 },
                { chinese:"可以用支付宝吗？", pinyin:"kě yǐ yòng Zhī fù bǎo ma?", french:"Puis-je payer avec Alipay ?", phonetic:"kheu-yi-yong-j-r'-fou-bao-ma", tone:3 },
                { chinese:"找钱", pinyin:"zhǎo qián", french:"La monnaie (rendue)", phonetic:"jao-tchienn", tone:3 }
            ]},
        ];

        function speak(text) {
            window.speechSynthesis.cancel();
            const utter = new SpeechSynthesisUtterance(text);
            utter.lang = "zh-CN";
            utter.rate = 0.82;
            window.speechSynthesis.speak(utter);
        }

        // --- SUB-COMPONENTS ---
        const ToneBadge = ({ tone }) => {
            const color = TONE_COLORS[tone] || TONE_COLORS[0];
            return <span className="badge-ton" style={{ background: color + "22", color, border: `1px solid ${color}44` }}>ton {tone === 0 ? "neutre" : tone}</span>;
        };

        const Flashcards = ({ phrases, onBack }) => {
            const [idx, setIdx] = useState(0);
            const [flipped, setFlipped] = useState(false);
            const p = phrases[idx];

            return (
                <div style={{ padding: 20 }}>
                    <div onClick={onBack} style={{ color: "#e8392a", marginBottom: 30, cursor:"pointer" }}>✕ Fermer la session</div>
                    <div style={{ display: "flex", flexDirection: "column", alignItems: "center", gap: 25 }}>
                        <div onClick={() => setFlipped(!flipped)} className={`card-inner ${flipped ? 'flipped' : ''}`} style={{ perspective: 1000 }}>
                            <div style={{ position:"absolute", inset:0, background:"#1a1a24", borderRadius:24, display:"flex", alignItems:"center", justifyContent:"center", border:"1px solid #333", backfaceVisibility:"hidden" }}>
                                <div style={{ fontSize: 72, fontWeight: "bold" }}>{p.chinese}</div>
                            </div>
                            <div style={{ position:"absolute", inset:0, background:"#2a1f2e", borderRadius:24, display:"flex", flexDirection:"column", alignItems:"center", justifyContent:"center", border:"1px solid #e8392a", backfaceVisibility:"hidden", transform:"rotateY(180deg)", padding:20, textAlign:"center" }}>
                                <div style={{ fontSize: 32, fontWeight: "bold", color: "#e8392a", marginBottom: 8 }}>{p.pinyin}</div>
                                <div style={{ fontSize: 18, color: "#fff", marginBottom: 4 }}>{p.french}</div>
                                <div style={{ fontSize: 14, color: "#666", fontStyle: "italic" }}>« {p.phonetic} »</div>
                                <div style={{ marginTop: 15 }}><ToneBadge tone={p.tone} /></div>
                            </div>
                        </div>
                        <div style={{ display:"flex", gap:15, width:"100%" }}>
                            <button onClick={() => { setFlipped(false); setIdx((idx + 1) % phrases.length); }} style={{ flex:1, padding:18, background:"#e8392a", border:"none", color:"white", borderRadius:16, fontSize:16, fontWeight:700 }}>Suivant →</button>
                        </div>
                        <div style={{ color:"#444" }}>Carte {idx + 1} / {phrases.length}</div>
                    </div>
                </div>
            );
        };

        const Phrasebook = ({ phrases, onBack }) => (
            <div style={{ padding: 20 }}>
                <div onClick={onBack} style={{ color: "#e8392a", marginBottom: 25, cursor:"pointer" }}>← Retour</div>
                {phrases.map((p, i) => (
                    <div key={i} className="phrase-item">
                        <div className="audio-circle" onClick={() => speak(p.chinese)}>▶</div>
                        <div style={{ flex:1 }}>
                            <div style={{ fontSize: 20, fontWeight: 700 }}>{p.chinese}</div>
                            <div style={{ display: "flex", gap: 10, alignItems: "center", marginTop: 2 }}>
                                <span style={{ color: TONE_COLORS[p.tone], fontSize: 14, fontWeight: 600 }}>{p.pinyin}</span>
                                <ToneBadge tone={p.tone} />
                            </div>
                            <div style={{ color: "#aaa", fontSize: 14, marginTop: 4 }}>{p.french}</div>
                        </div>
                    </div>
                ))}
            </div>
        );

        // --- MAIN APP ---
        function App() {
            const [activeId, setActiveId] = useState(null);
            const [subView, setSubView] = useState('menu'); // 'menu', 'flash', 'list'

            const currentMod = useMemo(() => MODULES.find(m => m.id === activeId), [activeId]);

            // View: Inside a Module
            if (activeId && currentMod) {
                if (subView === 'flash') return <Flashcards phrases={currentMod.phrases} onBack={() => setSubView('menu')} />;
                if (subView === 'list') return <Phrasebook phrases={currentMod.phrases} onBack={() => setSubView('menu')} />;

                return (
                    <div style={{ padding: 20 }}>
                        <div onClick={() => setActiveId(null)} style={{ color: "#e8392a", marginBottom: 25, cursor:"pointer" }}>← Menu Principal</div>
                        <div style={{ display: "flex", alignItems: "center", gap: 15, marginBottom: 30 }}>
                            <span style={{ fontSize: 48 }}>{currentMod.emoji}</span>
                            <div>
                                <h2 style={{ margin: 0 }}>{currentMod.title}</h2>
                                <span style={{ color: "#666", fontSize: 14 }}>{currentMod.phrases.length} expressions</span>
                            </div>
                        </div>

                        <div className="btn-mode" onClick={() => setSubView('flash')}>
                            <div style={{ fontSize: 28 }}>🃏</div>
                            <div>
                                <div style={{ fontWeight: 800, fontSize: 18 }}>Flashcards</div>
                                <div style={{ color: "#666", fontSize: 13 }}>Mémoriser avec des cartes</div>
                            </div>
                        </div>

                        <div className="btn-mode" onClick={() => setSubView('list')}>
                            <div style={{ fontSize: 28 }}>📖</div>
                            <div>
                                <div style={{ fontWeight: 800, fontSize: 18 }}>Phrasebook</div>
                                <div style={{ color: "#666", fontSize: 13 }}>Liste complète & Audio</div>
                            </div>
                        </div>
                    </div>
                );
            }

            // View: Dashboard
            return (
                <div style={{ padding: 20, maxWidth: 500, margin: "0 auto" }}>
                    <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 25 }}>
                        <div>
                            <h1 style={{ margin: 0, fontSize: 28, letterSpacing: "-1px" }}>学中文</h1>
                            <span style={{ color: "#666", fontSize: 14 }}>ChinaReady • Voyage</span>
                        </div>
                        <div style={{ background: "rgba(255,255,255,0.05)", padding: "6px 12px", borderRadius: 10, fontSize: 12, border: "1px solid rgba(255,255,255,0.1)" }}>🎵 Tons</div>
                    </div>

                    <div style={{ background: "linear-gradient(135deg, rgba(232,57,42,0.15), rgba(232,57,42,0.05))", borderRadius: 24, padding: 24, marginBottom: 30, border: "1px solid rgba(232,57,42,0.2)" }}>
                        <div style={{ fontSize: 36, fontWeight: 900, color: "#e8392a" }}>0%</div>
                        <div style={{ fontSize: 12, color: "#666", fontWeight: 700, letterSpacing: 1 }}>PROGRESSION TOTALE (62 EXP.)</div>
                    </div>

                    {MODULES.map(m => (
                        <div key={m.id} className="module-card" onClick={() => { setActiveId(m.id); setSubView('menu'); }}>
                            <span style={{ fontSize: 32 }}>{m.emoji}</span>
                            <div className="progress-container">
                                <div style={{ fontWeight: 700, fontSize: 16 }}>{m.title}</div>
                                <div className="progress-bar-bg">
                                    <div className="progress-bar-fill" style={{ width: '0%', background: m.color }}></div>
                                </div>
                            </div>
                            <div style={{ textAlign: "right", minWidth: 45 }}>
                                <div style={{ color: m.color, fontWeight: 800, fontSize: 14 }}>0%</div>
                                <div style={{ fontSize: 10, color: "#444" }}>{m.phrases.length} exp.</div>
                            </div>
                        </div>
                    ))}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
