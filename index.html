<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ChinaReady - Voyage</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body style="margin:0; background:#0f0f14; color:white; font-family: sans-serif;">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useCallback, useRef } = React;

        // --- MOTEUR AUDIO ---
        function speak(text) {
            if (!window.speechSynthesis) return;
            window.speechSynthesis.cancel();
            const u = new SpeechSynthesisUtterance(text);
            u.lang = "zh-CN"; 
            u.rate = 0.8;
            window.speechSynthesis.speak(u);
        }

        // --- COMPOSANTS INTERFACE ---
        function AudioBtn({ text, size = "md" }) {
            const [p, setP] = useState(false);
            const d = size === "lg" ? 44 : size === "sm" ? 28 : 34;
            return (
                <button onClick={e => { e.stopPropagation(); setP(true); speak(text); setTimeout(() => setP(false), 1000); }}
                    style={{ width:d, height:d, borderRadius:"50%", border: p ? "1.5px solid #e8392a" : "1.5px solid rgba(255,255,255,0.2)",
                    background: p ? "rgba(232,57,42,0.2)" : "rgba(255,255,255,0.1)", color:"white", cursor:"pointer" }}>
                    {p ? "■" : "▶"}
                </button>
            );
        }

        const TC = {1:"#e8392a", 2:"#f59e0b", 3:"#22c55e", 4:"#3b82f6", 0:"#9ca3af"};

        // --- DONNÉES DES MODULES ---
        const MODULES = [
            { id:"basics", emoji:"🗣️", title:"Survie de base", color:"#e8392a", phrases:[
                {chinese:"你好", pinyin:"nǐ hǎo", french:"Bonjour", phonetic:"ni-hao", tone:3},
                {chinese:"谢谢", pinyin:"xiè xie", french:"Merci", phonetic:"syè-syè", tone:4},
                {chinese:"对不起", pinyin:"duì bu qǐ", french:"Pardon", phonetic:"douèï-bou-tchi", tone:4}
            ]},
            { id:"food", emoji:"🍜", title:"Restaurants", color:"#f59e0b", phrases:[
                {chinese:"菜单", pinyin:"cài dān", french:"Le menu", phonetic:"tsaï-dann", tone:4},
                {chinese:"不要辣", pinyin:"bú yào là", french:"Pas épicé", phonetic:"bou-yao-la", tone:4}
            ]},
            { id:"transport", emoji:"🚇", title:"Transports", color:"#6366f1", phrases:[
                {chinese:"出租车", pinyin:"chū zū chē", french:"Taxi", phonetic:"tchou-tsou-tcheu", tone:1},
                {chinese:"多少钱？", pinyin:"duō shao qián?", french:"Combien ça coûte ?", phonetic:"douo-chao-tchienn", tone:1}
            ]}
        ];

        // --- APPLICATION PRINCIPALE ---
        function App() {
            const [activeMod, setActiveMod] = useState(null);

            if (activeMod) {
                const mod = MODULES.find(m => m.id === activeMod);
                return (
                    <div style={{padding:20}}>
                        <button onClick={() => setActiveMod(null)} style={{background:"none", border:"none", color:"#e8392a", fontSize:18, marginBottom:20, cursor:"pointer"}}>← Retour</button>
                        <h2>{mod.emoji} {mod.title}</h2>
                        {mod.phrases.map((p, i) => (
                            <div key={i} style={{background:"rgba(255,255,255,0.05)", margin:"10px 0", padding:15, borderRadius:12, display:"flex", alignItems:"center", gap:15}}>
                                <AudioBtn text={p.chinese} />
                                <div>
                                    <div style={{fontSize:20, fontWeight:"bold"}}>{p.chinese}</div>
                                    <div style={{color:TC[p.tone], fontSize:14}}>{p.pinyin}</div>
                                    <div style={{fontSize:14, color:"#ccc"}}>{p.french}</div>
                                </div>
                            </div>
                        ))}
                    </div>
                );
            }

            return (
                <div style={{padding:20, maxWidth:500, margin:"0 auto"}}>
                    <h1 style={{textAlign:"center", color:"#e8392a"}}>🇨🇳 ChinaReady</h1>
                    <p style={{textAlign:"center", color:"#888"}}>Prêt pour vos 2 semaines de voyage ?</p>
                    {MODULES.map(m => (
                        <div key={m.id} onClick={() => setActiveMod(m.id)} 
                            style={{background:"rgba(255,255,255,0.05)", padding:20, borderRadius:15, margin:"15px 0", cursor:"pointer", border:"1px solid rgba(255,255,255,0.1)"}}>
                            <span style={{fontSize:30}}>{m.emoji}</span>
                            <span style={{marginLeft:15, fontSize:18, fontWeight:"bold"}}>{m.title}</span>
                        </div>
                    ))}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
