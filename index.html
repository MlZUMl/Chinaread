<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>ChinaReady - Voyage</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        body { margin: 0; background: #0f0f14; color: white; font-family: 'Segoe UI', system-ui, sans-serif; -webkit-tap-highlight-color: transparent; }
        * { box-sizing: border-box; }
        .btn-active:active { transform: scale(0.95); }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useCallback, useRef } = React;

        // ─── AUDIO ────────────────────────────────────────────────────────────────────
        function speak(text) {
            if (!window.speechSynthesis) return;
            window.speechSynthesis.cancel();
            const utter = new SpeechSynthesisUtterance(text);
            utter.lang = "zh-CN";
            utter.rate = 0.82;
            window.speechSynthesis.speak(utter);
        }

        function AudioBtn({ text, size = "md" }) {
            const [playing, setPlaying] = useState(false);
            const dim = size === "lg" ? 44 : size === "sm" ? 28 : 34;
            return (
                <button onClick={(e) => { e.stopPropagation(); setPlaying(true); speak(text); setTimeout(() => setPlaying(false), 1400); }} 
                    style={{ width: dim, height: dim, borderRadius: "50%", border: playing ? "1.5px solid #e8392a" : "1.5px solid rgba(255,255,255,0.2)",
                    background: playing ? "rgba(232,57,42,0.2)" : "rgba(255,255,255,0.07)", color: playing ? "#e8392a" : "#aaa", cursor: "pointer", display: "flex", alignItems: "center", justifyContent: "center" }}>
                    {playing ? "■" : "▶"}
                </button>
            );
        }

        // ─── DATA (VOTRE CONTENU) ──────────────────────────────────────────────────────
        const TONE_COLORS = { 1:"#e8392a", 2:"#f59e0b", 3:"#22c55e", 4:"#3b82f6", 0:"#9ca3af" };
        const MODULES = [
            { id:"basics", emoji:"🗣️", title:"Survie de base", color:"#e8392a", phrases:[
                { chinese:"你好", pinyin:"nǐ hǎo", french:"Bonjour", phonetic:"ni-hao", tone:3 },
                { chinese:"谢谢", pinyin:"xiè xie", french:"Merci", phonetic:"syè-syè", tone:4 },
                { chinese:"对不起", pinyin:"duì bu qǐ", french:"Pardon", phonetic:"douèï-bou-tchi", tone:4 },
                { chinese:"我不懂", pinyin:"wǒ bù dǒng", french:"Je ne comprends pas", phonetic:"wo-bou-dong", tone:3 }
            ]},
            { id:"food", emoji:"🍜", title:"Restaurants", color:"#f59e0b", phrases:[
                { chinese:"菜单", pinyin:"cài dān", french:"Le menu", phonetic:"tsaï-dann", tone:4 },
                { chinese:"我要这个", pinyin:"wǒ yào zhè ge", french:"Je veux celui-ci", phonetic:"wo-yao-jeu-geu", tone:3 },
                { chinese:"不要辣", pinyin:"bú yào là", french:"Pas épicé", phonetic:"bou-yao-la", tone:4 }
            ]},
            { id:"transport", emoji:"🚇", title:"Transports", color:"#6366f1", phrases:[
                { chinese:"出租车", pinyin:"chū zū chē", french:"Taxi", phonetic:"tchou-tsou-tcheu", tone:1 },
                { chinese:"多少钱？", pinyin:"duō shao qián?", french:"Combien ça coûte ?", phonetic:"douo-chao-tchienn", tone:1 }
            ]}
        ];

        // ─── COMPOSANTS MODES ────────────────────────────────────────────────────────
        function QuizMode({ phrases, onClose }) {
            const [idx, setIdx] = useState(0);
            const [sel, setSel] = useState(null);
            const [score, setScore] = useState(0);
            const [questions] = useState(() => [...phrases].sort(() => Math.random() - 0.5).map(p => {
                const wrong = phrases.filter(x => x.chinese !== p.chinese).sort(() => Math.random() - 0.5).slice(0, 3).map(x => x.french);
                return { p, opts: [...wrong, p.french].sort(() => Math.random() - 0.5) };
            }));

            if (idx >= questions.length) return (
                <div style={{textAlign:"center", padding:40}}>
                    <h2>Quiz terminé !</h2>
                    <div style={{fontSize:48, color:"#22c55e"}}>{Math.round((score/questions.length)*100)}%</div>
                    <button onClick={onClose} style={{marginTop:20, background:"#e8392a", border:"none", color:"white", padding:"12px 24px", borderRadius:10}}>Retour</button>
                </div>
            );

            const q = questions[idx];
            return (
                <div style={{padding:20}}>
                    <div style={{textAlign:"center", background:"#1a1a24", padding:30, borderRadius:20, marginBottom:20}}>
                        <div style={{fontSize:48, fontWeight:"bold"}}>{q.p.chinese}</div>
                        <AudioBtn text={q.p.chinese} size="lg" />
                    </div>
                    {q.opts.map(o => (
                        <button key={o} onClick={() => !sel && (setSel(o), o === q.p.french && setScore(s=>s+1))}
                            style={{width:"100%", padding:15, margin:"5px 0", borderRadius:10, border:"1px solid #333", 
                            background: sel ? (o === q.p.french ? "#22c55e" : (o === sel ? "#ef4444" : "#1a1a24")) : "#1a1a24", color:"white"}}>
                            {o}
                        </button>
                    ))}
                    {sel && <button onClick={() => {setIdx(i=>i+1); setSel(null);}} style={{width:"100%", marginTop:15, background:"#e8392a", border:"none", padding:12, borderRadius:10, color:"white"}}>Suivant</button>}
                </div>
            );
        }

        // ─── APP PRINCIPALE ──────────────────────────────────────────────────────────
        function App() {
            const [activeId, setActiveId] = useState(null);
            const [mode, setMode] = useState('list');

            if (activeId) {
                const mod = MODULES.find(m => m.id === activeId);
                if (mode === 'quiz') return <QuizMode phrases={mod.phrases} onClose={() => setMode('list')} />;
                
                return (
                    <div style={{padding:20}}>
                        <button onClick={() => setActiveId(null)} style={{background:"none", border:"none", color:"#e8392a", fontSize:18, marginBottom:15}}>← Retour</button>
                        <h2 style={{margin:0}}>{mod.emoji} {mod.title}</h2>
                        <button onClick={() => setMode('quiz')} style={{width:"100%", margin:"20px 0", padding:12, background:"#22c55e", border:"none", borderRadius:10, color:"white", fontWeight:"bold"}}>Lancer le Quiz</button>
                        {mod.phrases.map((p, i) => (
                            <div key={i} style={{background:"rgba(255,255,255,0.05)", padding:15, borderRadius:12, marginBottom:10, display:"flex", alignItems:"center", gap:15}}>
                                <AudioBtn text={p.chinese} />
                                <div>
                                    <div style={{fontSize:20, fontWeight:"bold"}}>{p.chinese}</div>
                                    <div style={{color:TONE_COLORS[p.tone], fontSize:14}}>{p.pinyin}</div>
                                    <div style={{fontSize:14, color:"#aaa"}}>{p.french}</div>
                                </div>
                            </div>
                        ))}
                    </div>
                );
            }

            return (
                <div style={{padding:20, maxWidth:500, margin:"0 auto"}}>
                    <h1 style={{textAlign:"center", color:"#e8392a", fontSize:32}}>🇨🇳 ChinaReady</h1>
                    <p style={{textAlign:"center", color:"#666", marginBottom:30}}>Sélectionnez un module pour réviser</p>
                    {MODULES.map(m => (
                        <div key={m.id} onClick={() => setActiveId(m.id)} style={{background:"rgba(255,255,255,0.05)", padding:20, borderRadius:15, marginBottom:15, border:"1px solid rgba(255,255,255,0.1)", display:"flex", alignItems:"center"}}>
                            <span style={{fontSize:30}}>{m.emoji}</span>
                            <div style={{marginLeft:20}}>
                                <div style={{fontSize:18, fontWeight:"bold"}}>{m.title}</div>
                                <div style={{fontSize:12, color:"#888"}}>{m.phrases.length} phrases</div>
                            </div>
                        </div>
                    ))}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
