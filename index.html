// ─── AUDIO ────────────────────────────────────────────────────────────────────

function speak(text) {
  if (!window.speechSynthesis) return;
  window.speechSynthesis.cancel();
  const utter = new SpeechSynthesisUtterance(text);
  utter.lang = "zh-CN";
  utter.rate = 0.82;
  utter.pitch = 1;
  const voices = window.speechSynthesis.getVoices();
  const zhVoice = voices.find(v => v.lang.startsWith("zh"));
  if (zhVoice) utter.voice = zhVoice;
  window.speechSynthesis.speak(utter);
}

function AudioBtn({ text, size = "md" }) {
  const [playing, setPlaying] = useState(false);
  const handleClick = (e) => {
    e.stopPropagation();
    setPlaying(true);
    speak(text);
    setTimeout(() => setPlaying(false), 1400);
  };
  const dim = size === "lg" ? 44 : size === "sm" ? 28 : 34;
  const ico = size === "lg" ? 18 : size === "sm" ? 13 : 15;
  return (
    <button onClick={handleClick} title="Écouter" style={{
      width: dim, height: dim, borderRadius: "50%", padding: 0, flexShrink: 0,
      border: playing ? "1.5px solid #e8392a" : "1.5px solid rgba(255,255,255,0.18)",
      background: playing ? "rgba(232,57,42,0.2)" : "rgba(255,255,255,0.07)",
      color: playing ? "#e8392a" : "#aaa", cursor: "pointer",
      display: "flex", alignItems: "center", justifyContent: "center",
      transition: "all 0.2s",
    }}>
      {playing ? (
        <svg width={ico} height={ico} viewBox="0 0 24 24" fill="currentColor">
          <rect x="5" y="4" width="4" height="16" rx="1"/>
          <rect x="15" y="4" width="4" height="16" rx="1"/>
        </svg>

        <svg width={ico} height={ico} viewBox="0 0 24 24" fill="currentColor">

        </svg>
      )}
    </button>
  );
}

// ─── TONE BADGE ───────────────────────────────────────────────────────────────

function ToneBadge({ tone, size="sm" }) {
  const color = TONE_COLORS[tone] || TONE_COLORS[0];
  const s = size==="lg" ? {fontSize:13,padding:"3px 9px"} : {fontSize:11,padding:"2px 7px"};
  return <span style={{...s,background:color+"22",color,border:`1px solid ${color}55`,borderRadius:20,fontWeight:600,letterSpacing:0.3,fontFamily:"monospace"}}>ton {tone===0?"neutre":tone}</span>;
}

// ─── FLASHCARD MODE ───────────────────────────────────────────────────────────

function FlashcardMode({ phrases, onClose }) {
  const [index,setIndex]=useState(0);
  const [known,setKnown]=useState(0);
  const [review,setReview]=useState(0);
  const [done,setDone]=useState(false);
  const handleKnown=()=>{setKnown(k=>k+1);if(index+1>=phrases.length)setDone(true);else setIndex(i=>i+1);};
  const handleReview=()=>{setReview(r=>r+1);if(index+1>=phrases.length)setDone(true);else setIndex(i=>i+1);};
  if(done){
    const pct=Math.round((known/phrases.length)*100);
    return <div style={{display:"flex",flexDirection:"column",alignItems:"center",gap:24,padding:24}}>
      <div style={{fontSize:64}}>{pct>=70?"🎉":"💪"}</div>
      <div style={{fontSize:24,fontWeight:700,color:"#fff"}}>Session terminée !</div>
      <div style={{display:"flex",gap:24}}>
        <div style={{textAlign:"center"}}><div style={{fontSize:36,fontWeight:800,color:"#22c55e"}}>{known}</div><div style={{fontSize:13,color:"#666"}}>Mémorisées</div></div>
        <div style={{textAlign:"center"}}><div style={{fontSize:36,fontWeight:800,color:"#ef4444"}}>{review}</div><div style={{fontSize:13,color:"#666"}}>À revoir</div></div>
      </div>
      <div style={{background:"rgba(255,255,255,0.05)",borderRadius:12,padding:"12px 24px",fontSize:14,color:"#aaa"}}>Score : <span style={{color:pct>=70?"#22c55e":"#f59e0b",fontWeight:700}}>{pct}%</span></div>
      <button onClick={onClose} style={{background:"#e8392a",color:"#fff",border:"none",borderRadius:12,padding:"14px 32px",fontSize:16,cursor:"pointer",fontWeight:600}}>Retour au module</button>
    </div>;
  }
  return <div style={{display:"flex",flexDirection:"column",gap:20,padding:"0 4px"}}>
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
      <span style={{color:"#666",fontSize:14}}>{index+1} / {phrases.length}</span>
      <div style={{flex:1,margin:"0 16px",height:4,background:"rgba(255,255,255,0.07)",borderRadius:2}}><div style={{height:"100%",width:`${(index/phrases.length)*100}%`,background:"#e8392a",borderRadius:2,transition:"width 0.3s"}}/></div>
      <button onClick={onClose} style={{background:"none",border:"none",color:"#666",cursor:"pointer",fontSize:20}}>✕</button>
    </div>
    <Flashcard key={index} phrase={phrases[index]} onKnown={handleKnown} onReview={handleReview}/>
  </div>;
}

// ─── QUIZ MODE ────────────────────────────────────────────────────────────────

function QuizMode({ phrases, onClose }) {
  const [questions]=useState(()=>{
    const shuffled=[...phrases].sort(()=>Math.random()-0.5);
    return shuffled.map(p=>{
      const others=phrases.filter(x=>x.chinese!==p.chinese);
      const wrong=others.sort(()=>Math.random()-0.5).slice(0,3).map(x=>x.french);
      const options=[...wrong,p.french].sort(()=>Math.random()-0.5);
      return {phrase:p,options,correct:p.french};
    });
  });
  const [index,setIndex]=useState(0);
  const [selected,setSelected]=useState(null);
  const [score,setScore]=useState(0);
  const [done,setDone]=useState(false);
  const handleAnswer=opt=>{if(selected)return;setSelected(opt);if(opt===questions[index].correct)setScore(s=>s+1);};
  const handleNext=()=>{if(index+1>=questions.length){setDone(true);return;}setSelected(null);setIndex(i=>i+1);};
  if(done){
    const pct=Math.round((score/questions.length)*100);
    return <div style={{display:"flex",flexDirection:"column",alignItems:"center",gap:24,padding:24}}>
      <div style={{fontSize:64}}>{pct>=80?"🏆":pct>=50?"👍":"📚"}</div>
      <div style={{fontSize:24,fontWeight:700,color:"#fff"}}>Quiz terminé !</div>
      <div style={{fontSize:52,fontWeight:800,color:pct>=80?"#22c55e":pct>=50?"#f59e0b":"#ef4444"}}>{pct}%</div>
      <div style={{color:"#666",fontSize:14}}>{score} bonnes réponses sur {questions.length}</div>
      <div style={{display:"flex",gap:12}}>
        <button onClick={()=>{setIndex(0);setScore(0);setSelected(null);setDone(false);}} style={{background:"rgba(255,255,255,0.08)",border:"1px solid rgba(255,255,255,0.15)",color:"#fff",borderRadius:12,padding:"12px 24px",cursor:"pointer",fontSize:14,fontWeight:600}}>Rejouer</button>
        <button onClick={onClose} style={{background:"#e8392a",border:"none",color:"#fff",borderRadius:12,padding:"12px 24px",cursor:"pointer",fontSize:14,fontWeight:600}}>Retour</button>
      </div>
