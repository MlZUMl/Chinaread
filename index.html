<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>ChinaReady - Site Complet</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        body { margin: 0; background: #0f0f14; color: white; font-family: -apple-system, sans-serif; -webkit-tap-highlight-color: transparent; }
        .card-inner { transition: transform 0.6s; transform-style: preserve-3d; cursor: pointer; position: relative; min-height: 260px; }
        .flipped { transform: rotateY(180deg); }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useCallback, useMemo } = React;

        // --- MOTEUR AUDIO ---
        function speak(text) {
            if (!window.speechSynthesis) return;
            window.speechSynthesis.cancel();
            const u = new SpeechSynthesisUtterance(text);
            u.lang = "zh-CN"; u.rate = 0.82;
            window.speechSynthesis.speak(u);
        }

        const TONE_COLORS = { 1:"#e8392a", 2:"#f59e0b", 3:"#22c55e", 4:"#3b82f6", 0:"#9ca3af" };

        // --- TOUTES VOS DONNÉES ---
        const MODULES = [
            { id:"basics", emoji:"🗣️", title:"Survie de base", color:"#e8392a", phrases:[
                { chinese:"你好", pinyin:"nǐ hǎo", french:"Bonjour / Salut", phonetic:"ni-r' ha-o", tone:3 },
                { chinese:"谢谢", pinyin:"xiè xie", french:"Merci", phonetic:"syè-syè", tone:4 },
                { chinese:"不客气", pinyin:"bú kè qi", french:"De rien", phonetic:"bou-kheu-tchi", tone:2 },
                { chinese:"对不起", pinyin:"duì bu qǐ", french:"Pardon / Excusez-moi", phonetic:"douèï-bou-tchi-r'", tone:4 },
                { chinese:"没关系", pinyin:"méi guān xi", french:"Ce n'est pas grave", phonetic:"méï-gouan-ssi", tone:2 },
                { chinese:"是", pinyin:"shì", french:"Oui / C'est ça", phonetic:"ch-r'", tone:4 },
                { chinese:"不是", pinyin:"bú shì", french:"Non / Ce n'est pas ça", phonetic:"bou-ch-r'", tone:2 },
                { chinese:"我不懂", pinyin:"wǒ bù dǒng", french:"Je ne comprends pas", phonetic:"wo-bou-dong", tone:3 },
                { chinese:"请说慢一点", pinyin:"qǐng shuō màn yī diǎn", french:"Parlez plus lentement", phonetic:"tching-chouo-mann-yi-tyenn", tone:3 },
                { chinese:"你会说英语吗？", pinyin:"nǐ huì shuō yīng yǔ ma?", french:"Parlez-vous anglais ?", phonetic:"ni-houèï-chouo-ying-yü-ma", tone:3 }
            ]},
            { id:"food", emoji:"🍜", title:"Restaurants", color:"#f59e0b", phrases:[
                { chinese:"菜单", pinyin:"cài dān", french:"Le menu / La carte", phonetic:"tsaï-dann", tone:4 },
                { chinese:"我要这个", pinyin:"wǒ yào zhè ge", french:"Je veux celui-ci", phonetic:"wo-yao-jeu-geu", tone:3 },
                { chinese:"好吃！", pinyin:"hǎo chī!", french:"C'est délicieux !", phonetic:"hao-tch-r'", tone:3 },
                { chinese:"不要辣", pinyin:"bú yào là", french:"Pas épicé", phonetic:"bou-yao-la", tone:4 },
                { chinese:"素食", pinyin:"sù shí", french:"Végétarien", phonetic:"sou-ch-r'", tone:4 },
                { chinese:"买单", pinyin:"mǎi dān", french:"L'addition s'il vous plaît", phonetic:"maï-dann", tone:3 },
                { chinese:"水", pinyin:"shuǐ", french:"De l'eau", phonetic:"chouèï", tone:3 }
            ]},
            { id:"transport", emoji:"🚇", title:"Transports", color:"#6366f1", phrases:[
                { chinese:"出租车", pinyin:"chū zū chē", french:"Taxi", phonetic:"tchou-tsou-tcheu", tone:1 },
                { chinese:"地铁", pinyin:"dì tiě", french:"Métro", phonetic:"ti-tyè", tone:4 },
                { chinese:"机场", pinyin:"jī chǎng", french:"Aéroport", phonetic:"ji-tchang", tone:1 },
                { chinese:"多少钱？", pinyin:"duō shao qián?", french:"Combien ça coûte ?", phonetic:"douo-chao-tchienn", tone:1 },
                { chinese:"直走", pinyin:"zhí zǒu", french:"Tout droit", phonetic:"j-r'-tsou", tone:2 }
            ]},
            { id:"hotel", emoji:"🏨", title:"Hôtel", color:"#8b5cf6", phrases:[
                { chinese:"我有预订", pinyin:"wǒ yǒu yù dìng", french:"J'ai une réservation", phonetic:"wo-yiou-yü-ting", tone:3 },
                { chinese:"入住", pinyin:"rù zhù", french:"Check-in", phonetic:"rou-jou", tone:4 },
                { chinese:"WIFI密码是什么？", pinyin:"WIFI mì mǎ shì shén me?", french:"Quel est le WiFi ?", phonetic:"WiFi-mi-ma-ch-r'-chenn-meu", tone:4 }
            ]},
            { id:"shopping", emoji:"🛍️", title:"Shopping", color:"#ec4899", phrases:[
                { chinese:"太贵了", pinyin:"tài guì le", french:"C'est trop cher", phonetic:"taï-gouèï-leu", tone:4 },
                { chinese:"便宜一点", pinyin:"pián yi yī diǎn", french:"Un peu moins cher", phonetic:"pyenn-yi-yi-tyenn", tone:2 },
                { chinese:"我买了", pinyin:"wǒ mǎi le", french:"Je le prends", phonetic:"wo-maï-leu", tone:3 }
            ]},
            { id:"emergency", emoji:"🚨", title:"Urgences", color:"#ef4444", phrases:[
                { chinese:"救命！", pinyin:"jiù mìng!", french:"Au secours !", phonetic:"jyou-ming", tone:4 },
                { chinese:"警察", pinyin:"jǐng chá", french:"Police", phonetic:"jing-tcha", tone:3 },
                { chinese:"我迷路了", pinyin:"wǒ mí lù le", french:"Je suis perdu(e)", phonetic:"wo-mi-lou-leu", tone:3 }
            ]},
            { id:"numbers", emoji:"💬", title:"Chiffres", color:"#14b8a6", phrases:[
                { chinese:"一 二 三", pinyin:"yī èr sān", french:"1, 2, 3", phonetic:"yi-eu-r'-sann", tone:1 },
                { chinese:"百", pinyin:"bǎi", french:"Cent (100)", phonetic:"baï", tone:3 },
                { chinese:"元", pinyin:"yuán", french:"Yuan (monnaie)", phonetic:"yüann", tone:2 }
            ]}
        ];

        // --- COMPOSANTS ---
        function AudioBtn({ text }) {
            return <button onClick={(e) => { e.stopPropagation(); speak(text); }} style={{ background:"rgba(255,255,255,0.1)", border:"1px solid #444", color:"white", borderRadius:"50%", width:35, height:35, cursor:"pointer" }}>▶</button>;
        }

        function Flashcards({ phrases, onClose }) {
            const [idx, setIdx] = useState(0);
            const [flipped, setFlipped] = useState(false);
            const p = phrases[idx];

            return (
                <div style={{ padding:20 }}>
                    <button onClick={onClose} style={{ color:"#e8392a", background:"none", border:"none", fontSize:18, marginBottom:20 }}>← Retour</button>
                    <div onClick={() => setFlipped(!flipped)} className={`card-inner ${flipped ? 'flipped' : ''}`} style={{ perspective:1000 }}>
                        <div style={{ background:"#1a1a24", height:260, borderRadius:20, display:"flex", flexDirection:"column", alignItems:"center", justifyContent:"center", backfaceVisibility:"hidden", border:"1px solid #333", position:"absolute", width:"100%" }}>
                            <div style={{ fontSize:60 }}>{p.chinese}</div>
                            <AudioBtn text={p.chinese} />
                        </div>
                        <div style={{ background:"#2a1f2e", height:260, borderRadius:20, display:"flex", flexDirection:"column", alignItems:"center", justifyContent:"center", backfaceVisibility:"hidden", border:"1px solid #e8392a", transform:"rotateY(180deg)", position:"absolute", width:"100%" }}>
                            <div style={{ fontSize:30 }}>{p.pinyin}</div>
                            <div style={{ color:"#aaa" }}>{p.french}</div>
                        </div>
                    </div>
                    <div style={{ marginTop:280, display:"flex", gap:10 }}>
                        <button onClick={() => { setFlipped(false); setIdx((idx + 1) % phrases.length); }} style={{ flex:1, background:"#e8392a", border:"none", color:"white", padding:15, borderRadius:12 }}>Suivant →</button>
                    </div>
                </div>
            );
        }

        function App() {
            const [activeId, setActiveId] = useState(null);
            const [view, setView] = useState('list'); // 'list' or 'flash'

            if (activeId) {
                const mod = MODULES.find(m => m.id === activeId);
                if (view === 'flash') return <Flashcards phrases={mod.phrases} onClose={() => setView('list')} />;

                return (
                    <div style={{ padding:20 }}>
                        <button onClick={() => setActiveId(null)} style={{ color:"#e8392a", background:"none", border:"none", fontSize:18, marginBottom:20 }}>← Menu</button>
                        <h2>{mod.emoji} {mod.title}</h2>
                        <button onClick={() => setView('flash')} style={{ width:"100%", background:"#22c55e", border:"none", color:"white", padding:12, borderRadius:10, marginBottom:20 }}>Mode Flashcards 🎴</button>
                        {mod.phrases.map((p, i) => (
                            <div key={i} style={{ background:"rgba(255,255,255,0.05)", padding:15, borderRadius:15, marginBottom:10, display:"flex", alignItems:"center", gap:15, border:"1px solid rgba(255,255,255,0.1)" }}>
                                <AudioBtn text={p.chinese} />
                                <div>
                                    <div style={{ fontSize:22, fontWeight:"bold" }}>{p.chinese}</div>
                                    <div style={{ color:TONE_COLORS[p.tone], fontSize:14 }}>{p.pinyin}</div>
                                    <div style={{ color:"#ccc" }}>{p.french}</div>
                                </div>
                            </div>
                        ))}
                    </div>
                );
            }

            return (
                <div style={{ padding:20 }}>
                    <h1 style={{ textAlign:"center", color:"#e8392a" }}>🇨🇳 ChinaReady</h1>
                    {MODULES.map(m => (
                        <div key={m.id} onClick={() => setActiveId(m.id)} style={{ background:"rgba(255,255,255,0.05)", padding:20, borderRadius:20, marginBottom:15, border:"1px solid rgba(255,255,255,0.1)", display:"flex", alignItems:"center" }}>
                            <span style={{ fontSize:30 }}>{m.emoji}</span>
                            <div style={{ marginLeft:20 }}>
                                <div style={{ fontSize:18, fontWeight:"bold" }}>{m.title}</div>
                                <div style={{ fontSize:12, color:"#666" }}>{m.phrases.length} expressions</div>
                            </div>
                        </div>
                    ))}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
